name: Run Tests
on:
  push:
    branches: [main, alpha]
  pull_request:
    branches: [main, alpha]
  merge_group:
    branches: [main, alpha]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # 6.0.3
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # 4.4.0
        with:
          node-version: "24"
      - run: npm ci
      - run: npm test
