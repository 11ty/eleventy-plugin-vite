name: Run Tests
on:
  push:
    branches: [main, alpha]
  pull_request:
    branches: [main, alpha]
  merge_group:
    branches: [main, alpha]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # 6.4.0
        with:
          node-version: "24"
      - run: npm ci
      - run: npm test
